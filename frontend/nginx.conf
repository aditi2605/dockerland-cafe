# frontend/nginx.conf
#
# 🐳 Docker concept: This config file is COPIED into the Nginx container
# during docker build. The container uses it to configure how Nginx
# serves our React app.
#
# The key line is "try_files $uri $uri/ /index.html" — this makes
# React Router work correctly. Without it, refreshing /lessons/3 would
# give a 404 because Nginx doesn't know about React's client-side routes.

server {
    listen 80;
    server_name localhost;

    # Serve static files from the React build output
    root /usr/share/nginx/html;
    index index.html;

    # Handle all routes — try static file, then directory, then fallback to index.html
    # This is what makes React Router's URL-based navigation work!
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the backend container
    # /api/* → http://backend:8000/*
    # "backend" is resolved by Docker's internal DNS to the FastAPI container
    location /api/ {
        proxy_pass         http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Cache static assets (JS, CSS, images) for 1 year
    # Vite generates hashed filenames so cache-busting is automatic
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Gzip compression for faster loading
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
